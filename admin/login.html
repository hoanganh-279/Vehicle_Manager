<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — Parking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{
            font-family:'Be Vietnam Pro','Segoe UI',sans-serif;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            padding:20px;-webkit-font-smoothing:antialiased;
        }
        /* Animated background */
        body::before{
            content:'';position:fixed;inset:0;
            background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events:none;z-index:0;
        }
        .login-wrapper{position:relative;z-index:1;width:100%;max-width:420px;}
        .login-card{
            background:rgba(255,255,255,0.95);
            border-radius:24px;
            padding:40px 36px;
            box-shadow:0 25px 60px rgba(0,0,0,0.25);
        }
        .login-logo{
            text-align:center;margin-bottom:28px;
        }
        .login-logo .icon-wrap{
            width:72px;height:72px;border-radius:20px;
            background:linear-gradient(135deg,#667eea,#764ba2);
            display:inline-flex;align-items:center;justify-content:center;
            font-size:32px;color:#fff;margin-bottom:16px;
            box-shadow:0 8px 24px rgba(102,126,234,0.4);
        }
        .login-logo h1{font-size:1.6rem;font-weight:800;color:#1e293b;margin-bottom:6px;}
        .login-logo p{font-size:.88rem;color:#64748b;}
        .form-group{margin-bottom:18px;}
        .form-group label{font-size:.82rem;font-weight:600;color:#475569;margin-bottom:7px;display:block;}
        .input-wrap{position:relative;}
        .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:.9rem;}
        .input-wrap input{
            width:100%;padding:12px 14px 12px 40px;
            border:1.5px solid #e2e8f0;border-radius:12px;
            font-size:.95rem;font-family:inherit;color:#1e293b;
            background:#f8fafc;transition:all .2s;
        }
        .input-wrap input:focus{outline:none;border-color:#667eea;background:#fff;box-shadow:0 0 0 3px rgba(102,126,234,0.12);}
        .input-wrap .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#94a3b8;background:none;border:none;font-size:.9rem;}
        .btn-login{
            width:100%;padding:13px;border:none;border-radius:12px;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:#fff;font-size:1rem;font-weight:700;font-family:inherit;
            cursor:pointer;transition:all .25s;
            display:flex;align-items:center;justify-content:center;gap:8px;
            box-shadow:0 4px 20px rgba(102,126,234,0.4);
        }
        .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(102,126,234,0.5);}
        .btn-login:active{transform:translateY(0);}
        .alert-error{
            background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
            color:#b91c1c;border-radius:10px;padding:11px 14px;
            font-size:.87rem;margin-bottom:16px;display:flex;align-items:center;gap:8px;
        }
        .login-footer{text-align:center;margin-top:20px;font-size:.8rem;color:#94a3b8;}
        .login-footer span{color:#667eea;font-weight:600;}
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <div class="icon-wrap"><i class="fas fa-shield-alt"></i></div>
            <h1>Đăng nhập Admin</h1>
            <p>Hệ thống quản lý bãi đỗ xe thông minh</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="alert-error"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="admin@parking.com" required autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="pwInput" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fas fa-eye" id="pwIcon"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Đăng nhập
            </button>
        </form>

        <div class="login-footer">
            Parking System &nbsp;•&nbsp; <span>v1.0</span>
        </div>
    </div>
</div>
<script>
function togglePw(){
    const inp=document.getElementById('pwInput');
    const ico=document.getElementById('pwIcon');
    if(inp.type==='password'){inp.type='text';ico.className='fas fa-eye-slash';}
    else{inp.type='password';ico.className='fas fa-eye';}
}
</script>
</body>
</html>
