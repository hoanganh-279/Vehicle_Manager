<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin - Hệ thống quản lý bãi đỗ xe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #e0e5ec;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: #e0e5ec;
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow:
                15px 15px 40px #bec3cf,
                -15px -15px 40px #ffffff;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-3px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .neu-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            background: #e0e5ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                6px 6px 15px #bec3cf,
                -6px -6px 15px #ffffff;
            transition: box-shadow 0.3s ease;
        }

        .neu-icon:hover {
            box-shadow:
                3px 3px 8px #bec3cf,
                -3px -3px 8px #ffffff;
        }

        .neu-icon i {
            font-size: 35px;
            color: #6c7293;
        }

        .login-header h2 {
            color: #3d4468;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .login-header p {
            color: #9499b7;
            font-size: 14px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .neu-input {
            position: relative;
            background: #e0e5ec;
            border-radius: 12px;
            box-shadow:
                inset 6px 6px 12px #bec3cf,
                inset -6px -6px 12px #ffffff;
            transition: box-shadow 0.3s ease;
        }

        .neu-input input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 15px 20px 15px 45px;
            color: #3d4468;
            font-size: 15px;
            font-weight: 500;
            outline: none;
        }

        .neu-input input::placeholder {
            color: #9499b7;
            opacity: 0.7;
            font-size: 14px;
        }

        .neu-input input:focus::placeholder {
            opacity: 0.5;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9499b7;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .neu-input input:focus + .input-icon {
            color: #6c7293;
        }

        .password-group {
            position: relative;
        }

        .neu-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #e0e5ec;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9499b7;
            box-shadow:
                3px 3px 8px #bec3cf,
                -3px -3px 8px #ffffff;
            transition: all 0.3s ease;
        }

        .neu-toggle:hover {
            color: #6c7293;
            box-shadow:
                2px 2px 5px #bec3cf,
                -2px -2px 5px #ffffff;
        }

        .neu-button {
            width: 100%;
            background: #e0e5ec;
            border: none;
            border-radius: 12px;
            padding: 15px;
            color: #3d4468;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow:
                6px 6px 15px #bec3cf,
                -6px -6px 15px #ffffff;
            transition: all 0.3s ease;
        }

        .neu-button:hover {
            transform: translateY(-2px);
            box-shadow:
                8px 8px 20px #bec3cf,
                -8px -8px 20px #ffffff;
        }

        .neu-button:active {
            box-shadow:
                inset 3px 3px 8px #bec3cf,
                inset -3px -3px 8px #ffffff;
        }



        .alert {
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            background: #e0e5ec;
            color: #ff3b5c;
            box-shadow:
                inset 3px 3px 8px #ffb8c4,
                inset -3px -3px 8px #ffffff;
            font-size: 13px;
            display: flex;
            align-items: center;
            animation: slideDown 0.3s ease;
        }

        .alert.success {
            color: #4CAF50;
            box-shadow:
                inset 3px 3px 8px #a5d6a7,
                inset -3px -3px 8px #ffffff;
        }

        .btn-close {
            background: transparent;
            border: none;
            font-size: 18px;
            color: inherit;
            cursor: pointer;
            margin-left: auto;
            opacity: 0.7;
        }

        .btn-close:hover {
            opacity: 1;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .login-card {
                padding: 30px 20px;
                border-radius: 20px;
            }

            .login-header h2 {
                font-size: 1.6rem;
            }

            .neu-input input {
                padding: 12px 15px 12px 40px;
                font-size: 14px;
            }

            .input-icon {
                left: 12px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="neu-icon">
                    <i class="fas fa-parking"></i>
                </div>
                <h2>Đăng nhập Admin</h2>
                <p>Hệ thống quản lý bãi đỗ xe thông minh</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i>{{ message }}
                            <button type="button" class="btn-close" onclick="closeAlert()">×</button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" id="loginForm">
                <div class="form-group">
                    <div class="neu-input">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="neu-input password-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                        <button type="button" class="neu-toggle" id="passwordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="neu-button">
                    <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Đăng nhập
                </button>
            </form>


        </div>
    </div>

    <script>
        // Password toggle functionality
        const passwordToggle = document.getElementById('passwordToggle');
        const passwordInput = document.getElementById('password');
        passwordToggle.addEventListener('click', function() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 150);
        });

        // Input focus effects
        const inputs = document.querySelectorAll('.neu-input input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.closest('.neu-input').style.boxShadow = `
                    inset 3px 3px 6px #bec3cf,
                    inset -3px -3px 6px #ffffff
                `;
            });
            input.addEventListener('blur', function() {
                this.closest('.neu-input').style.boxShadow = `
                    inset 6px 6px 12px #bec3cf,
                    inset -6px -6px 12px #ffffff
                `;
            });
        });

        // Form validation (client-side)
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                e.preventDefault();
                showAlert('Vui lòng điền đầy đủ thông tin đăng nhập');
                return;
            }

            if (!isValidEmail(email)) {
                e.preventDefault();
                showAlert('Email không hợp lệ');
                return;
            }

            // If validation passes, allow form submission to Flask backend
        });

        function isValidEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function showAlert(message) {
            const alert = document.createElement('div');
            alert.className = 'alert';
            alert.innerHTML = `
                <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i>
                <span>${message}</span>
                <button type="button" class="btn-close" onclick="closeAlert(this)">×</button>
            `;
            document.querySelector('.login-header').insertAdjacentElement('afterend', alert);
        }

        function closeAlert(button) {
            const alert = button.closest('.alert');
            alert.style.animation = 'slideDown 0.3s ease reverse';
            setTimeout(() => {
                alert.remove();
            }, 300);
        }
    </script>
</body>
</html>
